version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite-blob --blobHost 0.0.0.0"
    ports:
      - "10000:10000"
      - "10001:10001"
    volumes:
      - azurite_data:/data

  app:
    build: .
    depends_on:
      - postgres
      - redis
      - azurite
    env_file:
      - .env  # Carrega o arquivo .env
    environment:
      JENKINS_JOBS_LIST: "http://${USERNAME}:${ACCESS_TOKEN}@10.30.208.157:8080/api/json"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      DB_URL: ${DB_URL}
      MAX_JOBS: ${MAX_JOBS}
    volumes:
      - .:/app
    command: bash -c "poetry run alembic upgrade head && poetry run python -m jenkins_log.controller.jenkins_logs"

  worker:
    build: .
    depends_on:
      - postgres
      - redis
      - azurite
    env_file:
      - .env  # Carrega o arquivo .env
    environment:
      JENKINS_JOBS_LIST: "http://${USERNAME}:${ACCESS_TOKEN}@10.30.208.157:8080/api/json"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      DB_URL: "postgresql+psycopg2://myuser:mypass@postgres:5432/buildsdb"
      MAX_JOBS: ${MAX_JOBS}
    volumes:
      - .:/app
    command: poetry run celery -A tasks worker --loglevel=info

volumes:
  postgres_data:
  jenkins_home:
  azurite_data:
